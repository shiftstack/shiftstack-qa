---
- name: Set result paths for {{ cpms_tests_type }}
  ansible.builtin.set_fact:
    cpms_results_subdir: "{{ cpms_test_results_dir }}/{{ cpms_tests_type }}"
    cpms_xml_file: "{{ cpms_test_results_dir }}/{{ cpms_tests_type }}/{{ cpms_test_junit_filename }}"

- name: Create results directory for {{ cpms_tests_type }}
  ansible.builtin.file:
    path: "{{ cpms_results_subdir }}"
    state: directory
    mode: u=rwx,g=rw,o=r

- name: Run {{ cpms_test_name }} {{ cpms_tests_type }} tests
  block:
    - name: Run make {{ cpms_tests_type }}
      ansible.builtin.shell: |
        source {{ home_dir }}/.bashrc
        make {{ cpms_tests_type }}
      args:
        chdir: "{{ cpms_test_dir }}"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
        OS_CLOUD: "{{ user_cloud }}"
        OPENSHIFT_CI: "true"
        ARTIFACT_DIR: "{{ cpms_results_subdir }}"
      changed_when: true
      register: cpms_test_output

  rescue:
    - name: Mark the CPMS {{ cpms_tests_type }} tests as UNSTABLE
      ansible.builtin.include_role:
        name: tools_stage_results
        tasks_from: mark_stage_unstable.yml
      vars:
        unstable_msg: >-
          The {{ cpms_test_name }} {{ cpms_tests_type }} test suite failed.

    - name: Run must-gather
      ansible.builtin.include_role:
        name: tools_must-gather
      vars:
        must_gather_suffix: "cpms-{{ cpms_tests_type }}"

- name: Post-process CPMS {{ cpms_tests_type }} results
  when: cpms_xml_file is file
  block:
    - name: Rename JUnit XML for post-processing
      ansible.builtin.copy:
        src: "{{ cpms_xml_file }}"
        dest: "{{ cpms_results_subdir }}/tmp.xml"
        remote_src: yes
        mode: u=rw,g=rw,o=r

    - name: Modify XML report tags for reporting
      ansible.builtin.script: |
        ../scripts/modifyE2ETags.py {{ cpms_results_subdir }}/tmp.xml {{ cpms_results_subdir }}/{{ cpms_test_name }}-{{ cpms_tests_type }}.xml \
          cpms {{ cpms_test_testsuite_name }}_{{ cpms_tests_type }} \
          > {{ cpms_results_subdir }}/report_processing.log

    - name: Convert test results to HTML
      ansible.builtin.shell: |
        junit2html {{ cpms_results_subdir }}/tmp.xml {{ cpms_results_subdir }}/{{ cpms_test_name }}-{{ cpms_tests_type }}.html
      changed_when: true

    - name: Create report directory for {{ cpms_tests_type }}
      ansible.builtin.file:
        path: "{{ report_dir }}/{{ cpms_test_testsuite_name }}_{{ cpms_tests_type }}"
        mode: u=rwx,g=rw,o=r
        state: directory

    - name: Copy XML to report directory
      ansible.builtin.copy:
        src: "{{ cpms_results_subdir }}/{{ cpms_test_name }}-{{ cpms_tests_type }}.xml"
        dest: "{{ report_dir }}/{{ cpms_test_testsuite_name }}_{{ cpms_tests_type }}/{{ cpms_test_name }}-{{ cpms_tests_type }}.xml"
        remote_src: yes
        mode: u=rwx,g=rwx,o=rwx

    - name: Copy HTML to report directory
      ansible.builtin.copy:
        src: "{{ cpms_results_subdir }}/{{ cpms_test_name }}-{{ cpms_tests_type }}.html"
        dest: "{{ report_dir }}/{{ cpms_test_testsuite_name }}_{{ cpms_tests_type }}/{{ cpms_test_name }}-{{ cpms_tests_type }}.html"
        remote_src: yes
        mode: u=rwx,g=rwx,o=rwx
