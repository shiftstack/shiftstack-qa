---
# Maps OCP release to MCE version (OCP minor - 10 = MCE minor).
# Reference: https://steps.ci.openshift.org/reference/hypershift-mce-install
tools_install_custom_mce_catalog_channel:
  '4.18': '2.8'
  '4.19': '2.9'
  '4.20': '2.10'
  '4.21': '2.11'
  '4.22': '2.12'
custom_catalog_name: "custom-mce-catalog"
