---
- name: NFV setup stage
  hosts: installer
  gather_facts: yes
  vars_files:
    - "../../configs/global.yml"
  tasks:
    - name: Main block
      block:
        - name: Run NFV setup procedures on OCP
          ansible.builtin.include_role:
            name: shiftstack.stages.day2ops
          vars:
            day2ops_steps: "{{ nfv_setup_steps }}"
            day2ops_run_procedure_task: run_procedure_no_verify.yml
      rescue:
        - name: Set NFV setup failure info
          ansible.builtin.set_fact:
            nfv_setup_failed: true
            nfv_setup_failed_task: "{{ ansible_failed_task.name | default('UNKNOWN') }}"

        - name: Fail the playbook
          ansible.builtin.fail:
            msg: >
              NFV setup failed at task '{{ nfv_setup_failed_task }}'.
              See ansible logs for more information.
      always:
        - name: Synchronize artifacts from the Ansible Managed Node to Ansible Controller
          ansible.builtin.include_role:
            name: shiftstack.tools.tools_ansible_inventory
            tasks_from: sync_artifacts.yml
